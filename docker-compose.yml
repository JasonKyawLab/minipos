version: "3.9"
services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: minipos-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: minipos-backend
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3001"        # host:container — both 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: minipos-frontend
    restart: always
    env_file:
      - .env
    ports:
      - "5173:3000"        # expose container's 3000 as host's 5173
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:5173
      - API_URL=http://backend:3001

volumes:
  postgres_data: