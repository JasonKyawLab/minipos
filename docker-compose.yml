version: "3.9"

# Production compose — compiled builds, no bind mounts, DB not exposed.
# Usage: docker compose up -d --build

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: minipos-postgres
    restart: always
    env_file: .env
    # Port NOT exposed to host — only backend can reach it via internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: production
    container_name: minipos-backend
    restart: always
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    container_name: minipos-frontend
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - API_URL=http://minipos-backend:3001
    networks:
      - public

volumes:
  postgres_data:

networks:
  internal:   # postgres ↔ backend only — not reachable from outside
  public:     # backend ↔ frontend ↔ host
