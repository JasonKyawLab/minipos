version: "3.9"

# Development compose — hot reload, source bind mounts, DB port exposed.
# Usage: docker compose -f docker-compose.dev.yml up

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: minipos-postgres-dev
    restart: always
    env_file: .env
    ports:
      - "5432:5432"       # exposed so you can connect with psql / TablePlus
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: minipos-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: always
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: node:20-alpine
    container_name: minipos-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_URL=http://minipos-backend-dev:3001

volumes:
  postgres_data_dev:
